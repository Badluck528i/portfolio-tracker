
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2540" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Portfolio Tracker</title>
</head>
<body>
  <header class="app-bar">
    <h1>Portfolio Tracker</h1>
    <button id="installBtn" class="btn ghost" aria-label="Install app" hidden>Install</button>
  </header>

  <main class="container">
    <section class="card">
      <h2>Add Position</h2>
      <form id="addForm" class="form" autocomplete="off">
        <div class="field">
          <label for="ticker">Ticker</label>
          <input id="ticker" name="ticker" inputmode="text" autocapitalize="characters" placeholder="AAPL" required />
        </div>
        <div class="field">
          <label for="shares">Shares</label>
          <input id="shares" name="shares" type="number" inputmode="decimal" step="any" placeholder="10" required />
        </div>
        <div class="field">
          <label for="price">Purchase Price</label>
          <input id="price" name="price" type="number" inputmode="decimal" step="any" placeholder="150" required />
        </div>
        <button class="btn primary full" type="submit">Add Position</button>
      </form>
    </section>

    <section class="summary card">
      <div class="summary-row">
        <span>Total Value</span>
        <strong id="totalValue">$0.00</strong>
      </div>
      <div class="summary-row">
        <span>Total P/L</span>
        <strong id="totalPL" class="neutral">$0.00</strong>
      </div>
      <div class="summary-row">
        <span>Total Return</span>
        <strong id="totalReturn" class="neutral">0.00%</strong>
      </div>
      <button id="refreshBtn" class="btn accent full" type="button">Update Live Prices</button>
      <div id="status" role="status" aria-live="polite" class="status"></div>
    </section>

    <section class="card">
      <h2>Positions</h2>
      <ul id="positions" class="list"></ul>
      <p id="emptyState" class="empty">No positions yet. Add your first above.</p>
    </section>
  </main>

  <footer class="app-footer">Data from Yahoo Finance. Prices may be delayed.</footer>

  <script src="app.js"></script>
</body>
</html>
